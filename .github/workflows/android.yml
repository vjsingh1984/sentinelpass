name: Android CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'sentinelpass-core/**'
      - 'sentinelpass-mobile-bridge/**'
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'sentinelpass-core/**'
      - 'sentinelpass-mobile-bridge/**'
      - 'android/**'
      - '.github/workflows/android.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build JNI libraries for all Android architectures
  mobile-bridge:
    name: Build JNI Libraries (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            x86_64-linux-android

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-jni-libs

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build JNI libraries
        run: |
          # Build for each architecture
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android; do
            cargo build --package sentinelpass-mobile-bridge --target $target --release
          done

      - name: Run mobile bridge unit tests
        run: cargo test --package sentinelpass-mobile-bridge --target x86_64-linux-android

      - name: Upload JNI libraries
        uses: actions/upload-artifact@v4
        with:
          name: android-jni-libs
          path: |
            target/aarch64-linux-android/release/libsentinelpass_mobile_bridge.so
            target/armv7-linux-androideabi/release/libsentinelpass_mobile_bridge.so
            target/x86_64-linux-android/release/libsentinelpass_mobile_bridge.so
          retention-days: 7

  # Android Unit Tests
  unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    needs: mobile-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-unit-tests

      - name: Grant execute permission for gradlew
        working-directory: android/SentinelPass
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: android/SentinelPass
        run: |
          ./gradlew testDebugUnitTest \
            --continue \
            --stacktrace

      - name: Generate test coverage report
        working-directory: android/SentinelPass
        run: |
          ./gradlew jacocoTestReport \
            --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-unit-test-results
          path: android/SentinelPass/app/build/reports/tests/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-coverage-report
          path: android/SentinelPass/app/build/reports/jacoco/
          retention-days: 7

  # Android Emulator Tests
  emulator-tests:
    name: Android Emulator Tests
    runs-on: macos-latest
    needs: mobile-bridge

    strategy:
      matrix:
        api-level: [29, 34]
        target: [default, google_apis]
        arch: [x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-emulator-${{ matrix.api-level }}

      - name: Download JNI libraries
        uses: actions/download-artifact@v4
        with:
          name: android-jni-libs
          path: android/SentinelPass/app/src/main/jniLibs/

      - name: Grant execute permission for gradlew
        working-directory: android/SentinelPass
        run: chmod +x gradlew

      - name: Enable KMP group
        uses: android-actions/setup-kotlin@main
        with:
          version: '1.9.0'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts', '**/libs/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create AVD and generate snapshot for caching
        uses: actions/setup-android/emulator@main
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-snapshot: true

      - name: Run instrumented tests
        working-directory: android/SentinelPass
        run: |
          ./gradlew connectedDebugAndroidTest \
            -Pandroid.testoptions.emulator=true \
            --continue \
            --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-emulator-test-results-api-${{ matrix.api-level }}
          path: android/SentinelPass/app/build/reports/androidTests/
          retention-days: 7

  # Android Lint
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: android/SentinelPass
        run: chmod +x gradlew

      - name: Run Android Lint
        working-directory: android/SentinelPass
        run: |
          ./gradlew lintDebug \
            --stacktrace

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-lint-results
          path: android/SentinelPass/app/build/reports/lint-results-*.html
          retention-days: 7

  # Integration Tests
  integration-tests:
    name: Android Integration Tests
    runs-on: ubuntu-latest
    needs: mobile-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-integration

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Run integration tests
        run: |
          # Run mobile bridge integration tests
          cargo test --package sentinelpass-mobile-bridge --test integration --target x86_64-linux-android -- --nocapture

      - name: Test JNI bridge API
        working-directory: sentinelpass-mobile-bridge
        run: |
          # Test JNI bridge functionality
          cargo test --target x86_64-linux-android --test jni -- --nocapture

  # Build APK
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-apk

      - name: Download JNI libraries
        uses: actions/download-artifact@v4
        with:
          name: android-jni-libs
          path: android/SentinelPass/app/src/main/jniLibs/

      - name: Grant execute permission for gradlew
        working-directory: android/SentinelPass
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-apk-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts') }}

      - name: Build debug APK
        working-directory: android/SentinelPass
        run: |
          ./gradlew assembleDebug \
            --stacktrace

      - name: Build release APK
        working-directory: android/SentinelPass
        run: |
          ./gradlew assembleRelease \
            --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: android/SentinelPass/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: android/SentinelPass/app/build/outputs/apk/release/*.apk
          retention-days: 7
